<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 國一先修早鳥預約專案 | 金名德晉校</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .floating-3d {
            animation: floating 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        .best-value-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const logoMain = "https://blogger.googleusercontent.com/img/a/AVvXsEjRqKCNWrsH37nthSraJgRc4iUslqv0Pw0urBa9ZwTuV3CLiliGNWjV3EddlJwJ7ox07Uol5GQL77Msjqw-_MUrwQIS6E7iHsdc-RaogP2TVjkJmZ1IkGSrX4ZCLfiZmapAPl5PyxovhZwtsxh080ROmCTJWQcbdtBMAAYIlO-BIsofB7tRYNn0ZZTHEgM";
            const logoSub = "https://blogger.googleusercontent.com/img/a/AVvXsEiZfm4VI-MMnLuqSU0xOgXwbWN-f3eN6F6Hn6rkbZes9wXfUw7655nIyo1LJ6QzA9cOv_j5wFfKW-gDTijB8NeuXVcZqvt93c-Mgiqn3KReMXtLJTczkM1PvTe_X0nLkTlMF_oXJnDUNmLACzognt2FkIU2A85MSRcQykKafbb8E-7xh1U9ZfW8_WYd6YY";
            const lineUrl = "https://line.me/ti/p/vQcf6cONnl";
            const mapUrl = "https://share.google/kF7KmSOl6BN2IOaQD";

            return (
                <div className="min-h-screen bg-slate-50 relative">
                    {/* 頂部通知欄 */}
                    <div className="bg-yellow-400 text-blue-900 text-center py-2 px-4 font-bold text-sm sticky top-0 z-50 shadow-md">
                        <i className="fas fa-users mr-2"></i> 精緻小團班，名額倒數中！【5/10 前預約享 9 折再折 1,000】
                    </div>

                    {/* 導覽列 */}
                    <nav className="bg-white py-4 px-6 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                            <img src={logoMain} alt="Logo" className="h-16 w-auto object-contain" />
                            <div className="border-l-2 border-slate-200 pl-3">
                                <h1 className="text-2xl font-bold text-blue-900 leading-tight">金名德晉校</h1>
                            </div>
                        </div>
                        <div className="flex gap-4 text-sm font-bold text-slate-600">
                            <a href="tel:036572508" className="flex items-center hover:text-blue-600 transition">
                                <i className="fas fa-phone mr-1 text-blue-500"></i> 03-6572508
                            </a>
                            <a href={mapUrl} target="_blank" className="flex items-center hover:text-blue-600 transition">
                                <i className="fas fa-map-marker-alt mr-1 text-red-500"></i> 竹北市文孝街23號
                            </a>
                        </div>
                    </nav>

                    {/* Hero 區塊 */}
                    <header className="gradient-bg text-white py-16 md:py-24 px-6 text-center relative overflow-hidden">
                        <div className="relative z-10 max-w-4xl mx-auto">
                            <h2 className="text-4xl md:text-6xl font-bold mb-6 tracking-tight">國一先修早鳥預約</h2>
                            <p className="text-xl md:text-2xl opacity-90 mb-10 text-blue-100 leading-relaxed">
                                <span className="bg-yellow-400 text-blue-900 px-2 py-1 rounded mx-1 font-black shadow-lg">5月至12月</span> 共 8 個月完整學習規劃 <br/>
                                精緻小團班教學，確保孩子領先起跑點
                            </p>
                            <div className="flex flex-wrap justify-center gap-4">
                                <span className="bg-white/10 backdrop-blur-md border border-white/20 px-6 py-3 rounded-full font-bold">
                                    <i className="fas fa-check-circle text-yellow-300 mr-2"></i> 訂金全額可領回
                                </span>
                                <span className="bg-white/10 backdrop-blur-md border border-white/20 px-6 py-3 rounded-full font-bold">
                                    <i className="fas fa-fire text-orange-400 mr-2"></i> 雙修加碼再折 $1,000
                                </span>
                            </div>
                        </div>
                        <div className="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 bg-blue-400/20 rounded-full blur-3xl"></div>
                    </header>

                    <main className="max-w-5xl mx-auto px-6 py-12">
                        {/* 優勢卡片 */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16">
                            {[
                                { icon: 'fa-clock', title: '8個月服務', desc: '5月陪伴到12月', color: 'blue' },
                                { icon: 'fa-hand-holding-usd', title: '5-6月$0', desc: '早鳥先修免費', color: 'green' },
                                { icon: 'fa-plus-circle', title: '雙修加碼', desc: '合報現折 $1,000', color: 'red' },
                                { icon: 'fa-shield-alt', title: '全額退費', desc: '訂金預約無風險', color: 'yellow' }
                            ].map((item, idx) => (
                                <div key={idx} className={`bg-white p-6 rounded-2xl shadow-sm text-center card-hover border-b-4 border-${item.color}-500`}>
                                    <div className={`text-${item.color}-500 text-3xl mb-3`}><i className={`fas ${item.icon}`}></i></div>
                                    <h3 className="font-bold text-sm md:text-base mb-1">{item.title}</h3>
                                    <p className="text-[10px] md:text-xs text-slate-500">{item.desc}</p>
                                </div>
                            ))}
                        </div>

                        {/* 費用試算表格 */}
                        <section className="bg-white rounded-3xl shadow-2xl overflow-hidden mb-8 border border-slate-100">
                            <div className="bg-slate-50 p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-800 tracking-tight">早鳥預約試算表</h2>
                                    <p className="text-blue-600 font-bold text-sm mt-1">
                                        <i className="fas fa-info-circle mr-1"></i> 以下學費為「扣除 5/10 前預繳之 2,000 元訂金」後的餘額
                                    </p>
                                </div>
                                <img src={logoSub} alt="金名標誌" className="h-10 opacity-60" />
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500 text-xs font-bold uppercase tracking-widest">
                                            <th className="py-5 px-8">課程組合</th>
                                            <th className="py-5 px-8 text-center">5-6 月先修</th>
                                            <th className="py-5 px-8">應繳學費餘額</th>
                                            <th className="py-5 px-8">教材費</th>
                                            <th className="py-5 px-8 text-right font-bold text-blue-600">8個月結清餘額</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {[
                                            { name: '英文單修', sub: '精緻小團班', early: '免費', fee: '$16,900', material: '$1,600', total: '$18,500' },
                                            { name: '數學單修', sub: '精緻小團班', early: '免費', fee: '$16,900', material: '$1,600', total: '$18,500' }
                                        ].map((row, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition">
                                                <td className="py-8 px-8">
                                                    <div className="font-bold text-slate-800">{row.name}</div>
                                                    <div className="text-xs text-slate-400 mt-1">{row.sub}</div>
                                                </td>
                                                <td className="py-8 px-8 text-center">
                                                    <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">完全免費</span>
                                                </td>
                                                <td className="py-8 px-8 text-slate-600 font-medium">{row.fee}</td>
                                                <td className="py-8 px-8 text-slate-600">{row.material}</td>
                                                <td className="py-8 px-8 text-right font-bold text-xl text-slate-800">{row.total}</td>
                                            </tr>
                                        ))}
                                        <tr className="bg-blue-950 text-white shadow-inner">
                                            <td className="py-10 px-8 relative">
                                                <div className="best-value-badge">年度最划算首選</div>
                                                <div className="font-bold text-2xl flex items-center">
                                                    <i className="fas fa-crown text-yellow-400 mr-3"></i> 英數雙修
                                                </div>
                                                <div className="text-xs text-blue-200 mt-2">5-12月共 8 個月完整課程</div>
                                            </td>
                                            <td className="py-10 px-8 text-center">
                                                <span className="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-bold">完全免費</span>
                                            </td>
                                            <td className="py-10 px-8">
                                                <div className="text-[10px] text-blue-300 line-through opacity-60">原價 $33,800</div>
                                                <div className="font-bold text-xl text-yellow-300">$32,800</div>
                                                <div className="text-[10px] text-blue-200">(加碼再折 $1,000)</div>
                                            </td>
                                            <td className="py-10 px-8 text-blue-100">$3,200</td>
                                            <td className="py-10 px-8 text-right">
                                                <div className="text-[10px] text-blue-200 mb-1">原價 $37,000 現折後餘額</div>
                                                <div className="font-bold text-4xl text-yellow-400">$36,000</div>
                                                <div className="bg-yellow-400 text-blue-900 text-[11px] py-1 px-3 rounded-md font-bold mt-3 inline-block shadow-lg">
                                                    平均每科每月僅約 $2,375
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>
                        <p className="text-slate-400 text-[10px] text-center mb-16 px-4">
                            ＊精算說明：(雙修餘額 $32,800 + 訂金 $2,000 + 教材費 $3,200) ÷ 8個月 ÷ 2學科 = 每科每月 $2,375。<br/>
                            此費用已包含所有先修、正式課程學費、教材及報名各項支出。
                        </p>

                        {/* 報名須知與聯絡 */}
                        <div className="grid md:grid-cols-2 gap-8 mb-16">
                            <div className="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm">
                                <h3 className="text-xl font-bold mb-6 flex items-center text-blue-900">
                                    <i className="fas fa-info-circle mr-3"></i> 專業報名須知
                                </h3>
                                <ul className="space-y-4 text-slate-600 text-sm md:text-base leading-relaxed">
                                    <li className="flex items-start">
                                        <i className="fas fa-check-circle text-green-500 mt-1 mr-3"></i>
                                        <span><strong>訂金預約：</strong> 繳交訂金 $2,000 即可享有 5-6 月免費先修與早鳥雙重折扣。</span>
                                    </li>
                                    <li className="flex items-start">
                                        <i className="fas fa-check-circle text-green-500 mt-1 mr-3"></i>
                                        <span><strong>安心退費：</strong> 本校提供全額退費保證，報名後若決定不參加，訂金全領回。</span>
                                    </li>
                                    <li className="flex items-start">
                                        <i className="fas fa-exclamation-triangle text-orange-500 mt-1 mr-3"></i>
                                        <span><strong>課程規範：</strong> 若參加先修後不續報正式課程，先修月份將依原價計費扣除。</span>
                                    </li>
                                </ul>
                            </div>
                            <div className="bg-blue-50 rounded-3xl p-8 border border-blue-100">
                                <h3 className="text-xl font-bold mb-4 text-blue-900 flex items-center">
                                    <i className="fas fa-location-arrow mr-3"></i> 聯絡諮詢
                                </h3>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm hover:shadow-md transition">
                                        <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                                            <i className="fas fa-phone-alt text-blue-600"></i>
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-slate-400">校區熱線</p>
                                            <a href="tel:036572508" className="text-lg font-bold text-slate-800">03-6572508</a>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm">
                                        <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                                            <i className="fas fa-map-marker-alt text-blue-600"></i>
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-slate-400">校區地址</p>
                                            <p className="text-sm font-bold text-slate-800">竹北市文孝街23號(補教協會2樓)</p>
                                        </div>
                                    </div>
                                    <a href={mapUrl} target="_blank" className="block w-full bg-blue-600 text-white text-center py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg">
                                        <i className="fas fa-directions mr-2"></i> 開啟地圖導航
                                    </a>
                                </div>
                            </div>
                        </div>

                        {/* 最後呼籲 */}
                        <div className="bg-slate-900 text-white rounded-[3rem] p-12 text-center shadow-2xl relative overflow-hidden">
                            <div className="relative z-10">
                                <h2 className="text-3xl font-bold mb-4">精緻小團班，名額倒數中</h2>
                                <p className="text-slate-400 mb-10 max-w-xl mx-auto leading-relaxed">
                                    我們重視每位孩子的學習成效。5/10 前繳費鎖定 8 個月超值早鳥價，
                                    <span className="text-yellow-400 font-bold block mt-2 text-xl">報名英數兩科再省 $1,000 元！</span>
                                </p>
                                <div className="flex flex-col md:flex-row justify-center gap-6">
                                    <a href={lineUrl} target="_blank" className="bg-[#06C755] px-12 py-5 rounded-2xl font-bold text-xl shadow-xl hover:scale-105 transition transform flex items-center justify-center">
                                        <i className="fab fa-line text-3xl mr-3"></i> LINE 預約諮詢
                                    </a>
                                    <a href="tel:036572508" className="bg-white text-slate-900 px-12 py-5 rounded-2xl font-bold text-xl shadow-xl hover:scale-105 transition transform flex items-center justify-center">
                                        <i className="fas fa-phone-alt mr-3 text-blue-600"></i> 電話報名
                                    </a>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* 頁尾 */}
                    <footer className="bg-slate-50 py-16 px-6 border-t border-slate-200">
                        <div className="max-w-5xl mx-auto flex flex-col items-center text-center">
                            <img src={logoMain} alt="Logo" className="h-16 mb-6 grayscale opacity-40" />
                            <h4 className="text-xl font-bold text-slate-800 tracking-wider text-balance">金名德晉校</h4>
                            <p className="text-sm text-slate-400 mt-2 leading-loose">
                                竹北市文孝街23號(補教協會2樓) | 03-6572508 <br/>
                                國中資優教育領導品牌 • 奧數金牌師資團隊
                            </p>
                            <div className="mt-8 pt-8 border-t border-slate-200 w-full text-slate-400 text-[10px] tracking-widest">
                                &copy; 2026 JINMING DE-JIN. ALL RIGHTS RESERVED.
                            </div>
                        </div>
                    </footer>

                    {/* 3D 浮動 Line 按鈕 */}
                    <a href={lineUrl} target="_blank" className="fixed bottom-8 right-8 z-[100] floating-3d flex items-center justify-center w-16 h-16 bg-[#06C755] rounded-full shadow-2xl border-4 border-white transition-transform active:scale-95">
                        <i className="fab fa-line text-white text-4xl"></i>
                        <span className="absolute -top-3 -right-3 bg-red-500 text-white text-[10px] px-2 py-1 rounded-full border-2 border-white font-bold animate-bounce shadow">預約</span>
                    </a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
